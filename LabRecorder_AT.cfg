; ============================================================
; LabRecorder — Configurazione Adaptronics
; ============================================================
; Copia questo file nella stessa cartella dell'eseguibile
; e rinominalo LabRecorder.cfg per caricarlo automaticamente.
; Oppure caricalo manualmente da File → Load Configuration.
;
; Il file LR_Runtime_Entries.csv deve stare nella stessa cartella.
; ============================================================

; === Cartella radice dove vengono salvate le registrazioni ===
; Struttura risultante: StudyRoot / ID_CAD / ID_Patch / run_001.xdf
; Modifica il percorso in base al tuo laboratorio.
StudyRoot=C:/Registrazioni/Adaptronics

; === Template percorso file ===
; %a = ID CAD       (dropdown popolato da CSV)
; %p = ID Patch     (dropdown popolato da CSV, figli del CAD selezionato)
; %n = Run number   (numero automatico a 3 cifre, es. 001)
PathTemplate=IDCAD_%a/PATCH_%p/run_%n.xdf

; === Stream richiesti ===
; Decommenta e modifica con il nome esatto dello stream LSL del tuo dispositivo.
; Se lo stream non è presente all'avvio, LabRecorder mostra un avviso.
; RequiredStreams="NomeStream (NomePC)"

; === Sincronizzazione online ===
; Decommenta se hai bisogno di post-processing sul timestamp in tempo reale.
; OnlineSync="NomeStream (NomePC) post_ALL"

; === Remote Control Socket ===
; Permette di controllare LabRecorder da un altro programma via rete.
RCSEnabled=0
RCSPort=22345

; === Avvio automatico ===
; Imposta a 1 per avviare la registrazione appena si apre il programma.
; AutoStart=0
